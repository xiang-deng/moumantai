# Expanded sizeClass (screen width > 240dp). Applies to: phone, tablet, desktop,
# HMI panel, and ESP32 (server classifies by wire-reported width).
#
# Source of truth for all clients — do not hand-edit generated files.
# Run: uv run python scripts/generate-tokens.py
# See compact.yaml for the category taxonomy and drift-guard rules.

# ===========================================================================
# Scoped — values differ per SizeClass
# ===========================================================================

# M3 type-scale sizes at the expanded reference (phone 390dp).
typography:
  displayLarge: 57
  displayMedium: 45
  displaySmall: 36
  headlineLarge: 32
  headlineMedium: 28
  headlineSmall: 24
  titleLarge: 22
  titleMedium: 16
  titleSmall: 14
  bodyLarge: 16
  bodyMedium: 14
  bodySmall: 12
  labelLarge: 14
  labelMedium: 12
  labelSmall: 11

# M3 spacing scale — expanded is the M3 reference.
spacing:
  xs: 4
  s: 8
  m: 16
  l: 24
  xl: 32

# Per-component dimensions (M3 reference). Compact shrinks to 48dp touch-target baseline.
sizing:
  buttonHeight: 40
  buttonPaddingX: 24
  chipHeight: 32
  chipPaddingX: 16
  fabSize: 56
  fabExtendedHeight: 56
  inputHeight: 56
  inputPaddingX: 16
  dialogPadding: 24
  iconSizeSmall: 18
  iconSize: 24
  iconSizeLarge: 32
  listItemHeight: 56
  topbarHeight: 56
  cardPadding: 16
  scaffoldBodyPadding: '0'
  switchTrackW: 52
  switchTrackH: 32
  switchThumbSm: 16
  switchThumbLg: 24
  iconTapTarget: 40

# ===========================================================================
# Invariant — must match compact.yaml exactly (drift-guard enforces this)
# ===========================================================================

typographyLineHeight:
  displayLarge: 1.12
  displayMedium: 1.16
  displaySmall: 1.22
  headlineLarge: 1.25
  headlineMedium: 1.29
  headlineSmall: 1.33
  titleLarge: 1.27
  titleMedium: 1.50
  titleSmall: 1.43
  bodyLarge: 1.50
  bodyMedium: 1.43
  bodySmall: 1.33
  labelLarge: 1.43
  labelMedium: 1.33
  labelSmall: 1.45

shape:
  none: 0
  xs: 4
  sm: 8
  md: 12
  lg: 16
  xl: 24
  full: 9999

shapeAlias:
  cardRadius: md
  dialogRadius: xl
  fabRadius: lg
  chipRadius: sm
  inputRadius: xs
  buttonRadius: full

elevation:
  none: 'none'
  raised: '0 1px 2px rgba(0,0,0,0.30), 0 1px 3px 1px rgba(0,0,0,0.15)'
  floating: '0 1px 3px rgba(0,0,0,0.30), 0 4px 8px 3px rgba(0,0,0,0.15)'
  elevated: '0 4px 4px rgba(0,0,0,0.30), 0 8px 12px 6px rgba(0,0,0,0.15)'

motion:
  # Core motion surface (bound by Kotlin tokens + ESP32 generated_tokens.h).
  durationShort: 150
  durationMedium: 250
  easingStandard: 'cubic-bezier(0.2, 0, 0, 1)'
  # M3 full duration scale + Expressive easing (web/PWA-CSS, generic iteration).
  durationShort1: 50
  durationShort2: 100
  durationShort3: 150
  durationShort4: 200
  durationMedium1: 250
  durationMedium2: 300
  durationLong1: 400
  durationLong2: 500
  durationLong3: 550
  durationLong4: 600
  easingEmphasized: 'cubic-bezier(0.2, 0, 0, 1)'
  easingEmphasizedDecelerate: 'cubic-bezier(0.05, 0.7, 0.1, 1)'
  easingEmphasizedAccelerate: 'cubic-bezier(0.3, 0, 0.8, 0.15)'

state:
  # M3 state-layer opacities. Keys omit "Opacity" suffix; Kotlin generator appends _OPACITY.
  disabled: 0.38
  hover: 0.08
  focus: 0.10
  pressed: 0.10
  dragged: 0.16

color:
  primary: '#D0BCFF'
  onPrimary: '#381E72'
  primaryContainer: '#4F378B'
  onPrimaryContainer: '#EADDFF'
  secondary: '#CCC2DC'
  onSecondary: '#332D41'
  secondaryContainer: '#4A4458'
  onSecondaryContainer: '#E8DEF8'
  # Tertiary: teal-tuned, invariant so the PWA's dynamic palette fallback
  # matches the Android static palette before applyTheme() hydrates.
  tertiary: '#AECAE5'
  onTertiary: '#163348'
  tertiaryContainer: '#2E4A60'
  onTertiaryContainer: '#CAE6FF'
  error: '#F2B8B5'
  onError: '#601410'
  errorContainer: '#8C1D18'
  onErrorContainer: '#F9DEDC'
  surface: '#1C1B1F'
  onSurface: '#E6E1E5'
  surfaceVariant: '#49454F'
  onSurfaceVariant: '#CAC4D0'
  surfaceContainerLowest: '#080E0C'
  surfaceContainerLow: '#1D1B20'
  surfaceContainer: '#211F26'
  surfaceContainerHigh: '#2B2930'
  surfaceContainerHighest: '#36343B'
  outline: '#938F99'
  outlineVariant: '#49454F'
  inverseSurface: '#E6E1E5'
  inverseOnSurface: '#313033'

zIndex:
  raised: 5
  overlay: 10
  modal: 20
  elevated: 30
  compactOverlay: 100
  toast: 1000
